spring:
  application:
    name: booklog
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:booklog;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  h2:
    console:
      enabled: true

server:
  port: 8080

booklog:
  cors:
    allowed-origins: http://localhost:3000
  jwt:
    secret: change-me-in-production-min-32-chars-long
    access-expiration-ms: 900000
    refresh-expiration-ms: 604800000
  kakao:
    rest-api-key: ${KAKAO_REST_API_KEY:}

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/booklog?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul}
    username: ${SPRING_DATASOURCE_USERNAME:booklog}
    password: ${SPRING_DATASOURCE_PASSWORD:booklog}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

booklog:
  cors:
    allowed-origins: ${BOOKLOG_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${BOOKLOG_JWT_SECRET:change-me-in-production-min-32-chars-long}
    access-expiration-ms: ${BOOKLOG_JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${BOOKLOG_JWT_REFRESH_EXPIRATION_MS:604800000}
  kakao:
    rest-api-key: ${KAKAO_REST_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
