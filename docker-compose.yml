services:
  mysql:
    image: mysql:8.4
    container_name: bookrecord-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: booklog
      MYSQL_USER: booklog
      MYSQL_PASSWORD: booklog
    volumes:
      - booklog_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  booklog_mysql_data:
